<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Weekly Meals</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 14px 24px;
      font-size: 18px;
      border-radius: 12px;
      cursor: pointer;
      color: #022c22;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.05);
      background: #16a34a;
    }

    .result {
      margin-top: 30px;
      text-align: left;
      line-height: 1.6;
      font-size: 18px;
    }

    .veg {
      color: #4ade80;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="container">
    <button onclick="generate()">Generate weekly meals</button>
    <div id="result" class="result"></div>
  </div>

  <script>
    const breakfasts = [
      "Oatmeal", "Yogurt with fruit", "Scrambled eggs",
      "Pancakes", "Smoothie bowl", "Toast with avocado"
    ];

    const mains = [
      { name: "Grilled chicken", veg: false },
      { name: "Vegetable stir fry", veg: true },
      { name: "Beef pasta", veg: false },
      { name: "Lentil curry", veg: true },
      { name: "Salmon with rice", veg: false },
      { name: "Veggie burger", veg: true }
    ];

    const sides = [
      { name: "French fries", veg: false },
      { name: "Roasted vegetables", veg: true },
      { name: "Rice", veg: false },
      { name: "Salad", veg: true },
      { name: "Mashed potatoes", veg: false },
      { name: "Steamed broccoli", veg: true }
    ];

    const pickRandom = (arr, n) =>
      [...arr].sort(() => 0.5 - Math.random()).slice(0, n);

    function generate() {
      const bf = pickRandom(breakfasts, 2);

      let selectedMains, selectedSides;

      while (true) {
        selectedMains = pickRandom(mains, 2);
        selectedSides = pickRandom(sides, 2);

        const vegCount =
          [...selectedMains, ...selectedSides].filter(i => i.veg).length;

        if (vegCount >= 2) break;
      }

      const format = (items) =>
        items.map(i =>
          typeof i === "string"
            ? i
            : `${i.name}${i.veg ? ' <span class="veg">(veg)</span>' : ''}`
        ).join(", ");

      document.getElementById("result").innerHTML = `
        <div><strong>Weekly Breakfasts:</strong> ${format(bf)}</div>
        <div><strong>Weekly Main Dishes:</strong> ${format(selectedMains)}</div>
        <div><strong>Weekly Sides:</strong> ${format(selectedSides)}</div>
      `;
    }
  </script>
</body>
</html>
